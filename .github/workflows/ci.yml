name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    # Spin up local PostgreSQL container for backend integration tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neondb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Root Workspace Dependencies
      run: npm ci

    # --- BACKEND AUDIT & TESTS ---
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Run Backend Lint
      run: |
        cd backend
        npm run lint

    - name: Build Backend
      run: |
        cd backend
        npm run build

    - name: Setup Test Database Migrations
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neondb
      run: |
        cd backend
        npm run db:migrate
        npm run db:seed

    - name: Run Backend Integration Tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neondb
        JWT_ACCESS_SECRET: github-actions-test-jwt-access-secret-minimum-256-bits
        JWT_REFRESH_SECRET: github-actions-test-jwt-refresh-secret-minimum-256-bits
        AI_PROVIDER: mock
        SUPABASE_URL: http://localhost:8000
        SUPABASE_SERVICE_KEY: mock-key
        SUPABASE_BUCKET: resumes
        FRONTEND_URL: http://localhost:3000
        BACKEND_URL: http://localhost:8080
      run: |
        cd backend
        npm run test

    # --- FRONTEND AUDIT & BUILD ---
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Frontend Lint
      run: |
        cd frontend
        npm run lint

    - name: Build Frontend
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      run: |
        cd frontend
        npm run build
